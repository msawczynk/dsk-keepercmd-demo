name: gate-5-dsk-roundtrip

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - 'docs/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: [self-hosted, rocky, dsk-keepercmd-demo]
    timeout-minutes: 10
    env:
      DSK_INSTALL_TOKEN: ${{ secrets.DSK_INSTALL_TOKEN }}

    steps:
      - name: Checkout dsk-keepercmd-demo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python venv
        run: |
          python3.11 -m venv .venv || python3 -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip

      - name: Install DSK (private)
        if: ${{ env.DSK_INSTALL_TOKEN != '' }}
        run: |
          source .venv/bin/activate
          pip install "dsk @ git+https://${DSK_INSTALL_TOKEN}@github.com/msawczynk/dsk.git@v2.19.0"
          echo "DSK_AVAILABLE=true" >> "${GITHUB_ENV}"

      - name: Skip DSK round-trip
        if: ${{ env.DSK_INSTALL_TOKEN == '' }}
        run: |
          echo "::warning::DSK_INSTALL_TOKEN secret missing - skipping dsk-dependent gate 5"
          echo "DSK_AVAILABLE=false" >> "${GITHUB_ENV}"

      - name: Gate 1 — run-dir integrity (sha256sum)
        run: cd run-dir && sha256sum -c SHA256SUMS.txt

      - name: Gate 5 — DSK round-trip (import-from-keepercmd --dry-run)
        if: ${{ env.DSK_AVAILABLE == 'true' }}
        id: gate5
        run: |
          source .venv/bin/activate
          dsk import-from-keepercmd run-dir/ --dry-run --output /tmp/demo-import-out
          EXIT_CODE=$?
          if [ "$EXIT_CODE" -ne 0 ]; then
            echo "Gate 5 FAILED — dsk import-from-keepercmd exited $EXIT_CODE" >&2
            exit 1
          fi
          echo "Gate 5 passed — DSK consumed run-dir without errors"
