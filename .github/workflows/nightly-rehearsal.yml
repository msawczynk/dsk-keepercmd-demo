name: nightly-rehearsal

# For Path B (real anonymised fixture), set `REHEARSAL_RUN_DIR` secret pointing to a
# checked-out anonymised run-dir. Consumer wired below (min2); synthetic job defaults to repo `run-dir/`.

on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC nightly
  workflow_dispatch:
    inputs:
      run_dir:
        description: 'Path to run-dir (leave blank for synthetic demo fixture)'
        required: false
        default: 'run-dir'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rehearsal-synthetic:
    name: Rehearsal — synthetic fixture
    runs-on: [self-hosted, rocky, dsk-keepercmd-demo]
    timeout-minutes: 15

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      DSK_INSTALL_TOKEN: ${{ secrets.DSK_INSTALL_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Resolve rehearsal run directory (consumer wired per Bob review min2)
        env:
          REHEARSAL_RUN_DIR: ${{ secrets.REHEARSAL_RUN_DIR }}
          INPUT_RUN_DIR: ${{ github.event.inputs.run_dir }}
        run: |
          if [ -z "${REHEARSAL_RUN_DIR}" ]; then
            echo "::warning::REHEARSAL_RUN_DIR secret is not set — using workflow input or fixture run-dir/ as fallback"
            RUN_DIR="${INPUT_RUN_DIR:-run-dir}"
          else
            echo "REHEARSAL_RUN_DIR is configured (length ${#REHEARSAL_RUN_DIR})"
            RUN_DIR="${REHEARSAL_RUN_DIR}"
          fi
          echo "Effective RUN_DIR=${RUN_DIR}"
          echo "RUN_DIR=${RUN_DIR}" >> "${GITHUB_ENV}"

      - name: Set up Python venv
        run: |
          python3.11 -m venv .venv || python3 -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip

      - name: Install DSK (private)
        if: ${{ env.DSK_INSTALL_TOKEN != '' }}
        run: |
          source .venv/bin/activate
          pip install "dsk @ git+https://${DSK_INSTALL_TOKEN}@github.com/msawczynk/dsk.git@v2.19.0"
          echo "DSK_AVAILABLE=true" >> "${GITHUB_ENV}"

      - name: Skip DSK-dependent gates
        if: ${{ env.DSK_INSTALL_TOKEN == '' }}
        run: |
          echo "::warning::DSK_INSTALL_TOKEN secret missing - skipping dsk-dependent gates"
          echo "DSK_AVAILABLE=false" >> "${GITHUB_ENV}"
          cat > /tmp/rehearsal-report.xml <<'XML'
          <testsuite name="nightly-rehearsal" tests="1" skipped="1" failures="0" errors="0">
            <testcase classname="nightly-rehearsal" name="dsk-dependent-gates">
              <skipped message="DSK_INSTALL_TOKEN secret missing"/>
            </testcase>
          </testsuite>
          XML

      - name: Gate 5 — import-from-keepercmd dry-run (regression guard)
        if: ${{ env.DSK_AVAILABLE == 'true' }}
        run: |
          source .venv/bin/activate
          dsk import-from-keepercmd "$RUN_DIR" --dry-run

      - name: Import — write manifests to /tmp/rehearsal-out/
        if: ${{ env.DSK_AVAILABLE == 'true' }}
        run: |
          source .venv/bin/activate
          dsk import-from-keepercmd "$RUN_DIR" --output /tmp/rehearsal-out/

      - name: Rehearse-report (stub — exits 1 until D9 R1 implements it)
        if: ${{ env.DSK_AVAILABLE == 'true' }}
        run: |
          source .venv/bin/activate
          mkdir -p /tmp
          dsk rehearse-report "$RUN_DIR" --format junit --output /tmp/rehearsal-report.xml || true

      - name: Upload rehearsal-report artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: rehearsal-report
          path: /tmp/rehearsal-report.xml
          if-no-files-found: warn

      - name: Create regression issue on schedule failure
        if: failure() && github.event_name == 'schedule'
        run: |
          DATESTAMP=$(date -u '+%Y-%m-%d')
          gh issue create \
            --title "[regression] nightly rehearsal failed ${DATESTAMP}" \
            --body "Nightly rehearsal job failed. See run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --label "regression,ci"

  rehearsal-report-upload:
    name: Rehearsal report — print to log
    runs-on: [self-hosted, rocky, dsk-keepercmd-demo]
    needs: rehearsal-synthetic
    if: always()
    timeout-minutes: 5

    steps:
      - name: Download rehearsal-report artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: rehearsal-report
          path: /tmp/artifacts

      - name: Print rehearsal report XML to job log
        run: |
          echo "=== rehearsal-report.xml ==="
          if [ -f /tmp/artifacts/rehearsal-report.xml ]; then
            cat /tmp/artifacts/rehearsal-report.xml
          else
            echo "(no report file — stub not yet implemented)"
          fi
